appId: ai.codeflow.app
productName: CodeFlow
directories:
  output: release
  buildResources: resources
files:
  - out/**/*
  - package.json
extraResources:
  - from: resources
    to: .
    filter:
      - "**/*.png"
win:
  target: nsis
  icon: resources/icon.png
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true

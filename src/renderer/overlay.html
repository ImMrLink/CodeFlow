<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self'; font-src 'self'"
    />
    <title>CodeFlow Overlay</title>
  </head>
  <body>
    <div id="pill" class="pill hidden">
      <!-- listening: reactive waveform -->
      <span class="ind wave" data-ind="wave">
        <i></i><i></i><i></i><i></i><i></i>
      </span>
      <!-- transcribing: thinking shimmer -->
      <span class="ind think" data-ind="think">
        <i></i><i></i><i></i><i></i><i></i>
      </span>
      <!-- formatting: bouncing dots -->
      <span class="ind dots" data-ind="dots">
        <i></i><i></i><i></i>
      </span>
      <!-- pasting / done: check -->
      <span class="ind check" data-ind="check">
        <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="#fff" stroke-width="2">
          <path d="M2.5 8.5 6 12l7.5-8"></path>
        </svg>
      </span>
      <span id="label">Listening…</span>
    </div>
    <script type="module" src="./overlay/main.ts"></script>
  </body>
</html>
